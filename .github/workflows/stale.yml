name: Close Stale Issues and PRs

on:
  schedule:
    - cron: "0 0 * * *" # Runs every day at midnight UTC

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          days-before-stale: 30
          days-before-close: 7

          stale-issue-label: stale
          stale-pr-label: stale

          stale-issue-message: >
            This issue has been automatically marked as stale because it has had no activity for 30 days.
            It will be closed in 7 days if no further activity occurs.

          close-issue-message: >
            Closing this issue due to inactivity. Feel free to reopen it if needed.

          stale-pr-message: >
            This pull request has been marked as stale because it has been inactive for 30 days.
            It will be closed in 7 days if no further activity occurs.

          close-pr-message: >
            Closing this pull request due to inactivity.

          exempt-issue-labels: "pinned,security,help wanted,in progress"
          exempt-pr-labels: "security,in progress"
